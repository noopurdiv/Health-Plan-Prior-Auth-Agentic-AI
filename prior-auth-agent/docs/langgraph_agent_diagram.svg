<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B46C1"/>
      <stop offset="100%" style="stop-color:#553C9A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6B46C1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" fill="#FAFAF8"/>
  <rect x="0" y="0" width="1200" height="56" fill="url(#purpleGrad)"/>
  <text x="40" y="36" fill="#FFFFFF" font-size="22" font-weight="700">ClearAuth LangGraph Agent Interaction</text>
  <text x="40" y="78" fill="#6B7280" font-size="14">Prior authorization agent with human-in-the-loop interrupt � StateGraph + MemorySaver</text>

  <!-- Input -->
  <rect x="40" y="110" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="140" fill="#6B46C1" font-size="12" font-weight="700">INPUT</text>
  <text x="60" y="165" fill="#1F2937" font-size="13" font-weight="600">Prior Auth Request</text>
  <text x="60" y="188" fill="#6B7280" font-size="11">Age � Sex � ICD-10 � CPT</text>
  <text x="60" y="204" fill="#6B7280" font-size="11">Procedure � Notes � Urgency</text>

  <!-- LangGraph container -->
  <rect x="300" y="95" width="560" height="420" rx="16" fill="#F5F3FF" stroke="#6B46C1" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="320" y="125" fill="#553C9A" font-size="14" font-weight="700">LangGraph Agent</text>
  <text x="470" y="125" fill="#6B7280" font-size="11">thread_id = request_id � checkpointer = MemorySaver</text>

  <!-- Nodes -->
  <rect x="330" y="150" width="150" height="72" rx="10" fill="#FFFFFF" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="175" fill="#6B46C1" font-size="11" font-weight="700">` parse_request</text>
  <text x="345" y="195" fill="#374151" font-size="10">Build parsed_query</text>
  <text x="345" y="210" fill="#374151" font-size="10">Reasoning step 1</text>

  <rect x="510" y="150" width="150" height="72" rx="10" fill="#FFFFFF" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="525" y="175" fill="#6B46C1" font-size="11" font-weight="700">a retrieve_policy</text>
  <text x="525" y="195" fill="#374151" font-size="10">ChromaDB top-K search</text>
  <text x="525" y="210" fill="#374151" font-size="10">policy_citations � step 2</text>

  <rect x="690" y="150" width="150" height="72" rx="10" fill="#FEF3C7" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="705" y="175" fill="#6B46C1" font-size="11" font-weight="700">b reason_and_decide</text>
  <text x="705" y="195" fill="#374151" font-size="10">Claude � JSON output</text>
  <text x="705" y="210" fill="#374151" font-size="10">ai_decision � confidence</text>

  <!-- Interrupt -->
  <polygon points="555,280 605,310 555,340 505,310" fill="#EDE9FE" stroke="#6B46C1" stroke-width="3" filter="url(#shadow)"/>
  <text x="528" y="306" fill="#553C9A" font-size="10" font-weight="700">INTERRUPT</text>
  <text x="518" y="320" fill="#553C9A" font-size="9">before log_decision</text>

  <rect x="510" y="370" width="150" height="60" rx="10" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 3" filter="url(#shadow)"/>
  <text x="525" y="395" fill="#6B7280" font-size="11" font-weight="700">c log_decision</text>
  <text x="525" y="415" fill="#6B7280" font-size="10">Resume after human acts</text>

  <circle cx="585" cy="470" r="22" fill="#27AE60" filter="url(#shadow)"/>
  <text x="573" y="476" fill="#FFFFFF" font-size="11" font-weight="700">END</text>

  <!-- Arrows inside graph -->
  <line x1="480" y1="186" x2="508" y2="186" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="186" x2="688" y2="186" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="765" y1="222" x2="765" y2="250" stroke="#6B46C1" stroke-width="2"/>
  <line x1="765" y1="250" x2="585" y2="250" stroke="#6B46C1" stroke-width="2"/>
  <line x1="585" y1="250" x2="585" y2="278" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="585" y1="340" x2="585" y2="368" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
  <line x1="585" y1="430" x2="585" y2="448" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>

  <!-- Input to graph -->
  <line x1="260" y1="160" x2="328" y2="175" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ChromaDB -->
  <ellipse cx="585" cy="186" rx="0" ry="0" fill="none"/>
  <rect x="900" y="140" width="130" height="90" rx="10" fill="#FFFFFF" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="920" y="168" fill="#6B46C1" font-size="11" font-weight="700">ChromaDB</text>
  <text x="920" y="188" fill="#374151" font-size="10">1,749 policy chunks</text>
  <text x="920" y="204" fill="#374151" font-size="10">CMS / NCD PDFs</text>
  <text x="920" y="220" fill="#6B7280" font-size="9">all-MiniLM-L6-v2</text>
  <line x1="660" y1="175" x2="898" y2="175" stroke="#6B46C1" stroke-width="1.5"/>
  <line x1="898" y1="175" x2="898" y2="195" stroke="#6B46C1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="898" y1="210" x2="662" y2="195" stroke="#6B46C1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="730" y="165" fill="#6B7280" font-size="9">query / citations</text>

  <!-- Claude -->
  <rect x="900" y="260" width="130" height="70" rx="10" fill="#FFFFFF" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="920" y="288" fill="#6B46C1" font-size="11" font-weight="700">Claude API</text>
  <text x="920" y="308" fill="#374151" font-size="10">claude-sonnet-4-6</text>
  <text x="920" y="324" fill="#6B7280" font-size="9">RAG-only prompts</text>
  <line x1="840" y1="195" x2="870" y2="260" stroke="#6B46C1" stroke-width="1.5"/>
  <line x1="870" y1="260" x2="898" y2="285" stroke="#6B46C1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="898" y1="305" x2="842" y2="210" stroke="#6B46C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HITL section -->
  <rect x="40" y="340" width="220" height="200" rx="12" fill="#FFFFFF" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="370" fill="#6B46C1" font-size="12" font-weight="700">HUMAN-IN-THE-LOOP</text>
  <text x="60" y="395" fill="#1F2937" font-size="13" font-weight="600">Reviewer Dashboard</text>
  <text x="60" y="418" fill="#6B7280" font-size="11">" AI tag + confidence</text>
  <text x="60" y="436" fill="#6B7280" font-size="11">" Policy chunk citations</text>
  <text x="60" y="454" fill="#6B7280" font-size="11">" Open PDF at page</text>
  <rect x="60" y="468" width="180" height="28" rx="6" fill="#EDE9FE" stroke="#6B46C1"/>
  <text x="72" y="487" fill="#553C9A" font-size="11" font-weight="600">Approve � Reject � Escalate</text>

  <!-- Interrupt to UI -->
  <line x1="505" y1="310" x2="262" y2="380" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="330" fill="#553C9A" font-size="10" font-weight="600">cached analysis</text>

  <!-- FastAPI -->
  <rect x="40" y="570" width="220" height="90" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="600" fill="#6B46C1" font-size="12" font-weight="700">FASTAPI</text>
  <text x="60" y="622" fill="#374151" font-size="11">POST /api/decision</text>
  <text x="60" y="640" fill="#6B7280" font-size="10">Persist human_decisions</text>
  <text x="60" y="656" fill="#6B7280" font-size="10">Resume graph (background)</text>

  <line x1="150" y1="540" x2="150" y2="568" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SQLite -->
  <rect x="300" y="570" width="200" height="90" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="320" y="600" fill="#6B46C1" font-size="12" font-weight="700">SQLite Audit Trail</text>
  <text x="320" y="622" fill="#374151" font-size="11">prior_auth_requests</text>
  <text x="320" y="640" fill="#374151" font-size="11">agent_analyses</text>
  <text x="320" y="656" fill="#374151" font-size="11">human_decisions</text>

  <line x1="260" y1="615" x2="298" y2="615" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="555" y1="340" x2="400" y2="568" stroke="#6B46C1" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="400" y1="568" x2="380" y2="600" stroke="#6B46C1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="555" fill="#6B7280" font-size="9">analysis saved at interrupt</text>

  <!-- Resume arrow -->
  <path d="M 260 650 Q 400 700 510 400" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="8 5" marker-end="url(#arrowDashed)"/>
  <text x="310" y="695" fill="#D97706" font-size="10" font-weight="600">invoke(None, config) resume</text>

  <!-- State box -->
  <rect x="530" y="570" width="330" height="170" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="598" fill="#6B46C1" font-size="12" font-weight="700">AgentState (shared across nodes)</text>
  <text x="550" y="622" fill="#374151" font-size="10">Input: patient_age, diagnosis_code, procedure_label, clinical_notes, urgency &</text>
  <text x="550" y="640" fill="#374151" font-size="10">Intermediate: parsed_query, policy_citations[], reasoning_steps[]</text>
  <text x="550" y="658" fill="#374151" font-size="10">Output: ai_decision (APPROVE|FLAG|ESCALATE), confidence_score, reasoning_trace</text>
  <text x="550" y="676" fill="#374151" font-size="10">Control: error (e.g. NO_POLICY_FOUND), raw_llm_response</text>
  <rect x="550" y="690" width="290" height="36" rx="6" fill="#FEF3C7" stroke="#D97706"/>
  <text x="562" y="713" fill="#92400E" font-size="10">Post-rules: emergent � ESCALATE � confidence &lt; 0.60 � ESCALATE</text>

  <!-- Legend -->
  <rect x="900" y="570" width="260" height="170" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="920" y="598" fill="#1F2937" font-size="12" font-weight="700">Legend</text>
  <line x1="920" y1="615" x2="960" y2="615" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="970" y="619" fill="#374151" font-size="10">Agent execution path</text>
  <line x1="920" y1="640" x2="960" y2="640" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowDashed)"/>
  <text x="970" y="644" fill="#374151" font-size="10">Resume after human decision</text>
  <line x1="920" y1="665" x2="960" y2="665" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
  <text x="970" y="669" fill="#374151" font-size="10">Deferred until resume</text>
  <rect x="920" y="682" width="14" height="14" fill="#FEF3C7" stroke="#6B46C1"/>
  <text x="942" y="694" fill="#374151" font-size="10">LLM reasoning node</text>
  <polygon points="947,710 957,720 947,730 937,720" fill="#EDE9FE" stroke="#6B46C1"/>
  <text x="965" y="724" fill="#374151" font-size="10">Graph interrupt (HITL)</text>
</svg>
